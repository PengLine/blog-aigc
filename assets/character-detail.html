<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* 详情页样式 */
        .detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .detail-header {
            margin-bottom: 40px;
        }
        
        .detail-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            display: inline-block;
            margin-right: 15px;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .detail-author {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }
        
        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0e0e0;
        }
        
        .author-name {
            font-weight: 600;
            color: #333;
        }
        
        .detail-type {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #2196f3, #1976d2);
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .detail-status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            vertical-align: middle;
            margin-top: 5px;
        }
        
        .status-public {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status-private {
            background: #fff3e0;
            color: #ef6c00;
        }
        
        .status-pending {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status-rejected {
            background: #ffebee;
            color: #c62828;
        }
        
        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
        
        .status-draft {
            background: #f5f5f5;
            color: #616161;
        }
        
        .detail-media {
            position: relative;
            background: #f8f9fa;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .detail-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .detail-image:hover {
            transform: scale(1.02);
        }
        
        .detail-info {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .detail-info h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .info-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .info-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }
        
        .detail-description {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .detail-description h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .detail-description p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
        }
        
        .detail-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            background: white;
            color: #666;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            background: #f8f9fa;
            border-color: #2196f3;
            color: #1976d2;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.2);
        }
        
        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        
        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .action-btn.danger {
            background: #ffebee;
            border-color: #f44336;
            color: #f44336;
        }
        
        .action-btn.danger:hover {
            background: #f44336;
            color: white;
        }
        
        .action-btn.liked {
            background: #ffebee;
            border-color: #f44336;
            color: #f44336;
        }
        
        .action-btn.favorited {
            background: #fff3e0;
            border-color: #ff9800;
            color: #ff9800;
        }
        
        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
        }
        
        .detail-tag {
            padding: 8px 16px;
            background: #f0f0f0;
            color: #666;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .detail-tag:hover {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        /* 积分设置区域 */
        .points-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .points-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        
        .points-input-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .points-input {
            width: 120px;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .points-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        /* 权限设置区域 */
        .permission-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        
        .permission-section h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        
        .permission-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .permission-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .permission-option:hover {
            background: #e3f2fd;
        }
        
        .permission-option input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .permission-option label {
            cursor: pointer;
            flex: 1;
        }
        
        /* 图片预览模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }
        
        .modal-image {
            width: 100%;
            height: auto;
            max-height: 90vh;
            object-fit: contain;
        }
        
        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-modal:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .detail-container {
                padding: 20px 15px;
            }
            
            .detail-header h1 {
                font-size: 2rem;
            }
            
            .detail-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .detail-image {
                height: 300px;
            }
            
            .detail-info,
            .detail-description,
            .points-section,
            .permission-section {
                padding: 20px;
            }
            
            .detail-actions {
                flex-direction: column;
                gap: 10px;
            }
            
            .action-btn {
                justify-content: center;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主内容区域 -->
        <div class="main-content">
            <div class="detail-container">
                <!-- 返回按钮 -->
                <button class="action-btn" onclick="goBack()" style="margin-bottom: 20px;">
                    <span>⬅️</span>
                    <span>返回</span>
                </button>

                <!-- 元信息 -->
                <div class="detail-meta">
                    <div class="detail-author">
                        <img src="" alt="作者头像" class="author-avatar" id="authorAvatar">
                        <span class="author-name" id="authorName">加载中...</span>
                    </div>
                    
                </div>

                <!-- 详情头部 -->
                <div class="detail-header">
                    <h1 id="detailTitle">加载中...</h1>
                    <span class="detail-status" id="detailStatus">加载中...</span>
                </div>
                <!-- 标签 -->
                <div class="detail-tags" id="detailTags">
                    <!-- 标签将通过JavaScript动态生成 -->
                </div>
                
                <!-- 媒体内容 -->
                <div class="detail-media" id="detailMedia">
                    <!-- 内容将通过JavaScript动态生成 -->
                </div>
                
                <!-- 详细信息 -->
                <div class="detail-info">
                    <h2>角色信息</h2>
                    <div class="info-grid" id="infoGrid">
                        <!-- 信息项将通过JavaScript动态生成 -->
                    </div>
                </div>
                
                <!-- 描述 -->
                <div class="detail-description">
                    <h2>角色描述</h2>
                    <p id="detailDescription">加载中...</p>
                </div>
                
                <!-- 权限设置（仅自己创建时显示） -->
                <div class="permission-section hidden" id="permissionSection">
                    <h2>权限设置</h2>
                    <div class="permission-options">
                        <div class="permission-option">
                            <input type="radio" name="permission" id="permPublic" value="public">
                            <label for="permPublic">
                                <strong>公开</strong> - 所有人都可以查看和使用
                            </label>
                        </div>
                        <div class="permission-option">
                            <input type="radio" name="permission" id="permPrivate" value="private">
                            <label for="permPrivate">
                                <strong>仅自己可见</strong> - 只有您可以查看和使用
                            </label>
                        </div>
                    </div>
                </div>
                
                <!-- 积分信息（所有人可见） -->
                <div class="points-section hidden" id="pointsSection">
                    <h2>使用积分</h2>
                    <div class="points-input-group">
                        <label>使用此角色需要消耗：</label>
                        <span id="pointsDisplay" style="font-size: 1.2rem; font-weight: 600; color: #333;">0 积分</span>
                    </div>
                </div>
                
                <!-- 积分编辑（仅自己创建时显示） -->
                <div class="points-section hidden" id="pointsEditSection">
                    <h2>使用积分设置</h2>
                    <div class="points-input-group">
                        <label>使用此角色需要消耗：</label>
                        <input type="number" class="points-input" id="pointsInput" value="0" min="0">
                        <span>积分</span>
                    </div>
                    <p style="color: #666; font-size: 0.9rem;">设置为0表示免费使用</p>
                </div>
                
                <!-- 操作按钮 -->
                <div class="detail-actions" id="detailActions">
                    <!-- 按钮将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- 图片预览模态框 -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <img src="" alt="预览图片" class="modal-image" id="modalImage">
        </div>
    </div>

                    tags: ["科幻", "女性", "赛博朋克", "未来"],
                    points: 10,
                    author: {
                        name: "创作者A",
                        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=creatorA"
                    },
                    originalAuthor: "创作者A"
                },
                {
                    id: 102,
                    title: "古代武侠男性角色",
                    description: "传统武侠风格的男性角色，身着古装，手持长剑",
                    image: "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=ancient%20chinese%20wuxia%20warrior%20male%20character%20with%20sword%20and%20traditional%20clothing&image_size=landscape_4_3",
                    status: "public",
                    created: "2026-02-28",
                    type: "wuxia",
                    gender: "male",
                    age: "middle",
                    style: "古风",
                    tags: ["武侠", "男性", "古风", "剑客"],
                    points: 8,
                    author: {
                        name: "创作者B",
                        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=creatorB"
                    },
                    originalAuthor: "创作者B"
                }
            ],
            drafts: [
                {
                    id: 201,
                    title: "未完成的角色设计",
                    description: "正在设计中的角色，尚未完成",
                    image: "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=unfinished%20character%20design%20sketch%20and%20draft&image_size=landscape_4_3",
                    status: "draft",
                    created: "2026-03-05",
                    type: "cyberpunk",
                    gender: "female",
                    age: "young",
                    style: "科幻",
                    tags: ["未完成", "设计", "草稿"],
                    points: 0,
                    author: {
                        name: "我自己",
                        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=myself"
                    }
                },
                {
                    id: 202,
                    title: "角色概念草稿",
                    description: "角色概念设计的初步草稿",
                    image: "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=character%20concept%20art%20draft%20sketch&image_size=landscape_4_3",
                    status: "draft",
                    created: "2026-03-03",
                    type: "fantasy",
                    gender: "male",
                    age: "middle",
                    style: "奇幻",
                    tags: ["概念", "草稿", "设计"],
                    points: 0,
                    author: {
                        name: "我自己",
                        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=myself"
                    }
                }
            ]
        };
        
        let currentCharacter = null;
        let isLiked = false;
        let isFavorited = false;
        
        // 初始化页面
        function init() {
            const params = getUrlParams();
            const character = findCharacter(params.id, params.type);
            
            if (!character) {
                alert('角色不存在');
                goBack();
                return;
            }
            
            currentCharacter = character;
            renderCharacterDetail(character, params.type);
        }
        
        // 查找角色
        function findCharacter(id, type) {
            const characters = mockCharacters[type] || [];
            return characters.find(c => c.id == id);
        }
        
        // 渲染角色详情
        function renderCharacterDetail(character, type) {
            // 设置标题
            document.getElementById('detailTitle').textContent = character.title;
            
            // 设置作者信息
            document.getElementById('authorName').textContent = character.author.name;
            document.getElementById('authorAvatar').src = character.author.avatar;
            
            // 设置状态
            const statusEl = document.getElementById('detailStatus');
            statusEl.textContent = getStatusText(character.status);
            statusEl.className = 'detail-status status-' + character.status;
            
            // 设置媒体内容
            document.getElementById('detailMedia').innerHTML = `
                <img src="${character.image}" alt="${character.title}" class="detail-image" onclick="openModal('${character.image}')">
            `;
            
            // 设置描述
            document.getElementById('detailDescription').textContent = character.description;
            
            // 设置标签
            const tagsContainer = document.getElementById('detailTags');
            if (character.tags && character.tags.length > 0) {
                tagsContainer.innerHTML = character.tags.map(tag => `
                    <span class="detail-tag">${tag}</span>
                `).join('');
            } else {
                tagsContainer.innerHTML = '<span class="detail-tag">无标签</span>';
            }
            
            // 设置信息网格
            document.getElementById('infoGrid').innerHTML = `
                <div class="info-item">
                    <div class="info-label">角色类型</div>
                    <div class="info-value">${character.type ? getTypeText(character.type) : '未设置'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">性别</div>
                    <div class="info-value">${character.gender ? getGenderText(character.gender) : '未设置'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">年龄段</div>
                    <div class="info-value">${character.age ? getAgeText(character.age) : '未设置'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">风格</div>
                    <div class="info-value">${character.style || '未设置'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">创建时间</div>
                    <div class="info-value">${character.created || '未知'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">使用积分</div>
                    <div class="info-value">${(character.points !== undefined && character.points !== null) ? (character.points > 0 ? character.points + ' 积分' : '免费') : '未设置'}</div>
                </div>
            `;
            
            // 根据类型渲染不同的操作按钮
            renderActions(type, character);
        }
        
        // 渲染操作按钮
        function renderActions(type, character) {
            const actionsContainer = document.getElementById('detailActions');
            
            // 添加点赞和分享按钮（所有页面都包含）
            let commonButtons = `
                <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike()">
                    <span>❤️</span>
                    <span>${isLiked ? '已点赞' : '点赞'}</span>
                </button>
                <button class="action-btn" onclick="shareContent()">
                    <span>📤</span>
                    <span>分享</span>
                </button>
            `;
            
            if (type === 'collection') {
                // 收藏的别人的角色：只能"一键应用"和"取消收藏"
                actionsContainer.innerHTML = `
                    <button class="action-btn primary" onclick="applyCharacter()">
                        <span>🚀</span>
                        <span>一键应用</span>
                    </button>
                    <button class="action-btn" onclick="cancelCollection()">
                        <span>💔</span>
                        <span>取消收藏</span>
                    </button>
                    ${commonButtons}
                `;
                
                // 隐藏权限设置（收藏的资产不能设置）
                document.getElementById('permissionSection').classList.add('hidden');
                // 显示积分信息（只读）
                document.getElementById('pointsSection').classList.remove('hidden');
                document.getElementById('pointsDisplay').textContent = character.points > 0 ? character.points + ' 积分' : '免费';
                // 隐藏积分编辑
                document.getElementById('pointsEditSection').classList.add('hidden');
            } else {
                // 自己创建的角色：根据状态显示不同按钮
                let statusButtons = '';
                
                switch (character.status) {
                    case 'public':
                        // 公开：私有、一键应用
                        statusButtons = `
                            <button class="action-btn primary" onclick="applyCharacter()">
                                <span>🚀</span>
                                <span>一键应用</span>
                            </button>
                            <button class="action-btn" onclick="setPrivate()">
                                <span>🔒</span>
                                <span>设为私有</span>
                            </button>
                        `;
                        break;
                    case 'private':
                        // 私有：公开、一键应用、编辑
                        statusButtons = `
                            <button class="action-btn primary" onclick="applyCharacter()">
                                <span>🚀</span>
                                <span>一键应用</span>
                            </button>
                            <button class="action-btn" onclick="setPublic()">
                                <span>🌍</span>
                                <span>设为公开</span>
                            </button>
                            <button class="action-btn" onclick="editCharacter()">
                                <span>✏️</span>
                                <span>编辑</span>
                            </button>
                        `;
                        break;
                    case 'pending':
                        // 审核中：一键应用、删除
                        statusButtons = `
                            <button class="action-btn primary" onclick="applyCharacter()">
                                <span>🚀</span>
                                <span>一键应用</span>
                            </button>
                            <button class="action-btn danger" onclick="deleteCharacter()">
                                <span>🗑️</span>
                                <span>删除</span>
                            </button>
                        `;
                        break;
                    case 'rejected':
                        // 审核未通过：一键应用、编辑、删除、发布
                        statusButtons = `
                            <button class="action-btn primary" onclick="applyCharacter()">
                                <span>🚀</span>
                                <span>一键应用</span>
                            </button>
                            <button class="action-btn" onclick="editCharacter()">
                                <span>✏️</span>
                                <span>编辑</span>
                            </button>
                            <button class="action-btn danger" onclick="deleteCharacter()">
                                <span>🗑️</span>
                                <span>删除</span>
                            </button>
                            <button class="action-btn" onclick="publishCharacter()">
                                <span>📤</span>
                                <span>发布</span>
                            </button>
                        `;
                        break;
                    default:
                        // 默认：一键应用
                        statusButtons = `
                            <button class="action-btn primary" onclick="applyCharacter()">
                                <span>🚀</span>
                                <span>一键应用</span>
                            </button>
                        `;
                }
                
                actionsContainer.innerHTML = statusButtons + commonButtons;
                
                // 显示权限设置
                document.getElementById('permissionSection').classList.remove('hidden');
                // 隐藏积分只读显示
                document.getElementById('pointsSection').classList.add('hidden');
                // 显示积分编辑
                document.getElementById('pointsEditSection').classList.remove('hidden');
                
                // 设置当前权限
                const permRadio = document.querySelector(`input[name="permission"][value="${character.status === 'public' ? 'public' : 'private'}"]`);
                if (permRadio) permRadio.checked = true;
                
                // 设置当前积分
                document.getElementById('pointsInput').value = character.points;
            }
        }
        
        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'public': '已公开',
                'private': '仅自己可见',
                'pending': '审核中',
                'rejected': '审核未通过',
                'draft': '草稿'
            };
            return statusMap[status] || status;
        }
        
        // 获取类型文本
        function getTypeText(type) {
            const typeMap = {
                'cyberpunk': '赛博朋克',
                'wuxia': '武侠古风',
                'fantasy': '奇幻魔法',
                'modern': '现代都市',
                'scifi': '科幻未来',
                'historical': '历史古装',
                'anime': '动漫风格',
                'realistic': '写实风格'
            };
            return typeMap[type] || type;
        }
        
        // 获取性别文本
        function getGenderText(gender) {
            const genderMap = {
                'male': '男性',
                'female': '女性',
                'other': '其他'
            };
            return genderMap[gender] || gender;
        }
        
        // 获取年龄段文本
        function getAgeText(age) {
            const ageMap = {
                'child': '儿童',
                'young': '青年',
                'middle': '中年',
                'old': '老年'
            };
            return ageMap[age] || age;
        }
        
        // 返回上一页
        function goBack() {
            window.location.href = 'my-assets-character.html';
        }
        
        // 打开图片模态框
        function openModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').style.display = 'flex';
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
        
        // 一键应用角色
        function applyCharacter() {
            alert(`正在应用角色：${currentCharacter.title}\n消耗积分：${currentCharacter.points}\n\n应用成功！`);
        }
        
        // 编辑角色
        function editCharacter() {
            // 将当前角色数据序列化为URL参数
            const params = new URLSearchParams();
            params.append('id', currentCharacter.id);
            params.append('type', 'edit');
            params.append('dataType', getUrlParams().type);
            
            // 跳转到创建页面并传递数据
            window.location.href = `create-character.html?${params.toString()}`;
        }
        
        // 预览角色
        function previewCharacter() {
            alert('预览角色效果');
        }
        
        // 发布角色
        function publishCharacter() {
            if (confirm('确定要发布这个角色吗？')) {
                alert('角色已提交审核！');
            }
        }
        
        // 删除角色
        function deleteCharacter() {
            if (confirm('确定要删除这个角色吗？此操作不可恢复。')) {
                alert('角色已删除');
                goBack();
            }
        }
        
        // 设为私有
        function setPrivate() {
            if (confirm('确定要将此角色设为私有吗？')) {
                alert('角色已设为私有');
                location.reload();
            }
        }
        
        // 设为公开
        function setPublic() {
            if (confirm('确定要将此角色设为公开吗？')) {
                alert('角色已设为公开');
                location.reload();
            }
        }
        
        // 取消收藏
        function cancelCollection() {
            if (confirm('确定要取消收藏吗？')) {
                alert('已取消收藏');
                window.location.href = 'my-assets-character.html';
            }
        }
        
        // 切换点赞
        function toggleLike() {
            isLiked = !isLiked;
            const btn = document.getElementById('likeBtn');
            if (btn) {
                btn.classList.toggle('liked', isLiked);
            }
            alert(isLiked ? '已点赞' : '已取消点赞');
        }
        
        // 分享内容
        function shareContent() {
            alert('分享链接已复制到剪贴板！');
        }
        
        // 点击模态框背景关闭
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
