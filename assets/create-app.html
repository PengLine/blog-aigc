    <div class="container">

        <div class="create-form">
            <h2>应用信息</h2>
            
            <div class="form-group">
                <label for="appName">应用名称</label>
                <input type="text" id="appName" placeholder="请输入应用名称">
            </div>
            
            <div class="form-group">
                <label for="appDescription">应用描述</label>
                <textarea id="appDescription" placeholder="请输入应用描述"></textarea>
            </div>
            
            <div class="form-group">
                <div class="label-with-button">
                    <label>应用图标</label>
                    <button class="btn-ai-generate" onclick="openAIModal()">
                        <i class="fas fa-magic"></i> AI 生成
                    </button>
                </div>
                <div class="image-upload" onclick="document.getElementById('appImage').click()">
                    <input type="file" id="appImage" accept="image/*">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击上传图片或拖拽图片到此处</p>
                    <img id="previewImage" class="preview-image hidden" src="" alt="预览图片">
                </div>
            </div>
            
            <div class="form-group">
                <label for="appType">应用类型</label>
                <select id="appType">
                    <option value="productivity">生产力</option>
                    <option value="creative">创意工具</option>
                    <option value="education">教育</option>
                    <option value="entertainment">娱乐</option>
                    <option value="utilities">实用工具</option>
                    <option value="other">其他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="appRarity">稀有度</label>
                <select id="appRarity">
                    <option value="common">普通</option>
                    <option value="uncommon">优秀</option>
                    <option value="rare">稀有</option>
                    <option value="epic">史诗</option>
                    <option value="legendary">传说</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="appFeatures">功能特点</label>
                <textarea id="appFeatures" placeholder="请输入应用的功能特点，每行一个"></textarea>
            </div>
            
            <div class="form-group">
                <label for="appUsage">使用方法</label>
                <textarea id="appUsage" placeholder="请输入应用的使用方法，每行一个步骤"></textarea>
            </div>
            
            <div class="form-group">
                <label for="appTags">标签</label>
                <input type="text" id="appTags" placeholder="请输入标签，用逗号分隔">
                <div class="tag-input" id="tagInput"></div>
            </div>
            
            <div class="form-group">
                <label for="appPoints">使用积分</label>
                <input type="number" id="appPoints" min="0" placeholder="请输入使用该应用需要消耗的积分">
            </div>
            
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="goBack()">取消</button>
                <button class="btn btn-primary" onclick="saveDraft()">保存草稿</button>
                <button class="btn btn-primary" onclick="publishApp()">发布</button>
            </div>
        </div>
    </div>
    
    <!-- AI 生成弹框 -->
    <div class="modal-overlay" id="aiModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">AI 生成图片</h3>
                <button class="modal-close" onclick="closeAIModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="aiPrompt">生成提示</label>
                    <textarea class="ai-prompt" id="aiPrompt" placeholder="请输入生成提示，例如：现代风格的应用图标，蓝色调，简约设计"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAIModal()">取消</button>
                <button class="btn btn-primary" onclick="generateWithAI()">生成</button>
            </div>
        </div>
    </div>

        // 获取URL参数
        function getUrlParams() {
            const params = {};
            const search = window.location.search;
            if (search) {
                const pairs = search.substring(1).split('&');
                pairs.forEach(pair => {
                    const [key, value] = pair.split('=');
                    params[decodeURIComponent(key)] = decodeURIComponent(value || '');
                });
            }
            return params;
        }

        // 页面加载时初始化
        function init() {
            const params = getUrlParams();
            if (params.type === 'edit' && params.id) {
                loadDraftData(params.id, params.dataType);
                document.querySelector('.create-form h2').textContent = '编辑应用';
            }
            
            // 图片上传预览
            document.getElementById('appImage').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const previewImage = document.getElementById('previewImage');
                        previewImage.src = e.target.result;
                        previewImage.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // 标签输入处理
            document.getElementById('appTags').addEventListener('keypress', function(e) {
                if (e.key === ',') {
                    e.preventDefault();
                    addTag(this.value.trim());
                    this.value = '';
                }
            });
        }
        
        // 加载草稿数据
        function loadDraftData(id, dataType) {
            const apps = mockApps[dataType] || [];
            const draft = apps.find(a => a.id == id);
            
            if (draft) {
                // 填充表单
                document.getElementById('appName').value = draft.title || '';
                document.getElementById('appDescription').value = draft.description || '';
                document.getElementById('appType').value = draft.type || 'productivity';
                document.getElementById('appRarity').value = draft.rarity || 'common';
                document.getElementById('appFeatures').value = draft.features || '';
                document.getElementById('appUsage').value = draft.usage || '';
                document.getElementById('appPoints').value = draft.points || 0;
                
                // 设置标签
                if (draft.tags && draft.tags.length > 0) {
                    document.getElementById('appTags').value = draft.tags.join(', ');
                    draft.tags.forEach(tag => addTag(tag));
                }
                
                // 设置预览图片
                if (draft.image) {
                    const previewImage = document.getElementById('previewImage');
                    previewImage.src = draft.image;
                    previewImage.classList.remove('hidden');
                }
            } else {
                console.log('未找到应用数据:', id, dataType);
            }
        }
        
        // 添加标签
        function addTag(tagText) {
            if (!tagText) return;
            
            const tagInput = document.getElementById('tagInput');
            const tagElement = document.createElement('div');
            tagElement.className = 'tag';
            tagElement.innerHTML = `${tagText}<span class="remove-tag" onclick="removeTag(this)">×</span>`;
            tagInput.appendChild(tagElement);
        }
        
        // 移除标签
        function removeTag(element) {
            element.parentElement.remove();
        }
        
        // 保存草稿
        function saveDraft() {
            const appData = collectFormData();
            appData.status = 'draft';
            
            // 模拟保存操作
            alert('草稿已保存');
            window.location.href = 'my-assets-app.html';
        }
        
        // 发布应用
        function publishApp() {
            const appData = collectFormData();
            appData.status = 'public';
            
            // 模拟发布操作
            if (confirm('确定要发布这个应用吗？')) {
                alert('应用已提交审核！');
                window.location.href = 'my-assets-app.html';
            }
        }
        
        // 收集表单数据
        function collectFormData() {
            const tags = [];
            document.querySelectorAll('.tag').forEach(tag => {
                tags.push(tag.textContent.replace('×', '').trim());
            });
            
            return {
                title: document.getElementById('appName').value,
                description: document.getElementById('appDescription').value,
                type: document.getElementById('appType').value,
                rarity: document.getElementById('appRarity').value,
                features: document.getElementById('appFeatures').value,
                usage: document.getElementById('appUsage').value,
                tags: tags,
                points: parseInt(document.getElementById('appPoints').value) || 0,
                image: document.getElementById('previewImage').src
            };
        }
        
        // AI生成相关函数
        function openAIModal() {
            document.getElementById('aiModal').classList.add('active');
        }
        
        function closeAIModal() {
            document.getElementById('aiModal').classList.remove('active');
        }
        
        function generateWithAI() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) {
                alert('请输入生成提示');
                return;
            }
            
            // 模拟 AI 生成过程
            alert('AI 生成中，请稍候...');
            
            // 模拟生成结果
            setTimeout(() => {
                document.getElementById('previewImage').src = `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(prompt)}&image_size=landscape_4_3`;
                document.getElementById('previewImage').classList.remove('hidden');
                closeAIModal();
            }, 2000);
        }
        
        // 返回上一页
        function goBack() {
            window.history.back();
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
