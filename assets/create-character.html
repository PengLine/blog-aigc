        }

            line-height: 1.6;

        }

            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;

        }

            color: #718096;

        }

            background: white;

            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2196f3;
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-group select {
            cursor: pointer;
            background-color: white;
        }
        
        .image-upload {
            border: 2px dashed #dee2e6;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .image-upload:hover {
            border-color: #2196f3;
            background-color: #f8f9fa;
        }
        
        .image-upload input {
            display: none;
        }
        
        .image-upload i {
            font-size: 48px;
            color: #ccc;
            margin-bottom: 10px;
        }
        
        .image-upload p {
            margin: 0;
            color: #666;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            margin-top: 10px;
            border-radius: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        
        .tag-input {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .tag {
            background: #e9ecef;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            display: flex;
            align-items: center;
        }
        
        .tag .remove-tag {
            margin-left: 8px;
            cursor: pointer;
            color: #666;
        }
        
        .tag .remove-tag:hover {

        }

        .btn-primary:hover {

        }
        
        .btn-secondary {
            background: #6c757d;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: #5a6268;

        }
        
        .btn-outline {

        }
        
        .btn-outline:hover {

        .back-link:hover {

            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;

        }
        
        .modal {

            border-radius: 15px;
            padding: 30px;
            max-width: 600px;

            max-height: 90vh;

            <div class="form-group">

                    <button class="btn-ai-generate" onclick="openAIModal()">

                    </button>
                </div>
                <div class="image-upload" onclick="document.getElementById('characterImage').click()">

                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击上传图片或拖拽图片到此处</p>
                    <img id="previewImage" class="preview-image hidden" src="" alt="预览图片">
                </div>
            </div>
            
            <div class="form-group">
                <label for="characterType">角色类型</label>
                <select id="characterType">
                    <option value="cyberpunk">赛博朋克</option>
                    <option value="wuxia">武侠古风</option>
                    <option value="fantasy">奇幻魔法</option>
                    <option value="modern">现代都市</option>
                    <option value="scifi">科幻未来</option>
                    <option value="historical">历史古装</option>
                    <option value="anime">动漫风格</option>
                    <option value="realistic">写实风格</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="characterGender">性别</label>
                <select id="characterGender">
                    <option value="male">男性</option>
                    <option value="female">女性</option>
                    <option value="other">其他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="characterAge">年龄</label>
                <select id="characterAge">
                    <option value="child">儿童</option>
                    <option value="young">青年</option>
                    <option value="middle">中年</option>
                    <option value="old">老年</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="characterStyle">风格</label>
                <input type="text" id="characterStyle" placeholder="请输入角色风格">
            </div>
            
            <div class="form-group">
                <label for="characterTags">标签</label>
                <input type="text" id="characterTags" placeholder="请输入标签，用逗号分隔">
                <div class="tag-input" id="tagInput"></div>
            </div>
            
            <div class="form-group">
                <label for="characterPoints">使用积分</label>
                <input type="number" id="characterPoints" min="0" placeholder="请输入使用该角色需要消耗的积分">
            </div>
            
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="goBack()">取消</button>
                <button class="btn btn-primary" onclick="saveDraft()">保存草稿</button>
                <button class="btn btn-primary" onclick="publishCharacter()">发布</button>
            </div>
        </div>
    </div>
    
    <!-- AI 生成弹框 -->
    <div class="modal-overlay" id="aiModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">AI 生成图片</h3>
                <button class="modal-close" onclick="closeAIModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="aiPrompt">生成提示</label>
                    <textarea class="ai-prompt" id="aiPrompt" placeholder="请输入生成提示，例如：一个穿着未来科技服装的女性角色，蓝色头发，赛博朋克风格"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAIModal()">取消</button>
                <button class="btn btn-primary" onclick="generateWithAI()">生成</button>
            </div>
        </div>
    </div>

                pairs.forEach(pair => {
                    const [key, value] = pair.split('=');
                    params[decodeURIComponent(key)] = decodeURIComponent(value || '');
                });
            }
            return params;

        // 页面加载时初始化
        function init() {
            const params = getUrlParams();
            if (params.type === 'edit' && params.id) {
                loadDraftData(params.id, params.dataType);
                document.getElementById('pageTitle').textContent = '编辑角色';
                document.getElementById('pageDescription').textContent = '编辑您的AI角色资产';
            }
            
            // 图片上传预览
            document.getElementById('characterImage').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const previewImage = document.getElementById('previewImage');
                        previewImage.src = e.target.result;
                        previewImage.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // 标签输入处理
            document.getElementById('characterTags').addEventListener('keypress', function(e) {
                if (e.key === ',') {
                    e.preventDefault();
                    addTag(this.value.trim());
                    this.value = '';
                }
            });
        }
        
        // 加载草稿数据
        function loadDraftData(id, dataType) {
            const characters = mockCharacters[dataType] || [];
            const draft = characters.find(c => c.id == id);
            
            if (draft) {
                // 填充表单
                document.getElementById('characterName').value = draft.title || '';
                document.getElementById('characterDescription').value = draft.description || '';
                document.getElementById('characterType').value = draft.type || 'cyberpunk';
                document.getElementById('characterGender').value = draft.gender || 'male';
                document.getElementById('characterAge').value = draft.age || 'young';
                document.getElementById('characterStyle').value = draft.style || '';
                document.getElementById('characterPoints').value = draft.points || 0;
                
                // 设置标签
                if (draft.tags && draft.tags.length > 0) {
                    document.getElementById('characterTags').value = draft.tags.join(', ');
                    draft.tags.forEach(tag => addTag(tag));
                }
                
                // 设置预览图片
                if (draft.image) {
                    const previewImage = document.getElementById('previewImage');
                    previewImage.src = draft.image;
                    previewImage.classList.remove('hidden');
                }
            } else {
                console.log('未找到角色数据:', id, dataType);
            }
        }
        
        // 添加标签
        function addTag(tagText) {
            if (!tagText) return;
            
            const tagInput = document.getElementById('tagInput');
            const tagElement = document.createElement('div');
            tagElement.className = 'tag';
            tagElement.innerHTML = `${tagText}<span class="remove-tag" onclick="removeTag(this)">×</span>`;
            tagInput.appendChild(tagElement);
        }
        
        // 移除标签
        function removeTag(element) {
            element.parentElement.remove();
        }
        
        // 保存草稿
        function saveDraft() {
            const characterData = collectFormData();
            characterData.status = 'draft';
            
            // 模拟保存操作
            alert('草稿已保存');
            window.location.href = 'my-assets-character.html';
        }
        
        // 发布角色
        function publishCharacter() {

            // 模拟发布操作
            alert('角色已发布');
            window.location.href = 'my-assets-character.html';
        }
        
        // 收集表单数据
        function collectFormData() {
            const tags = Array.from(document.querySelectorAll('.tag')).map(tag => tag.textContent.replace('×', '').trim());
            
            return {
                title: document.getElementById('characterName').value,
                description: document.getElementById('characterDescription').value,
                image: document.getElementById('previewImage').src || '',
                type: document.getElementById('characterType').value,
                gender: document.getElementById('characterGender').value,
                age: document.getElementById('characterAge').value,
                style: document.getElementById('characterStyle').value,
                tags: tags,
                points: parseInt(document.getElementById('characterPoints').value) || 0
            };
        }
        
        // 打开 AI 生成弹框
        function openAIModal() {
            document.getElementById('aiModal').classList.add('active');
        }
        
        // 关闭 AI 生成弹框
        function closeAIModal() {
            document.getElementById('aiModal').classList.remove('active');
        }
        
        // 使用 AI 生成
        function generateWithAI() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) {
                alert('请输入生成提示');
                return;
            }
            
            // 模拟 AI 生成过程
            alert('AI 生成中，请稍候...');
            
            // 模拟生成结果
            setTimeout(() => {
                document.getElementById('previewImage').src = `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(prompt)}&image_size=landscape_4_3`;
                document.getElementById('previewImage').classList.remove('hidden');
                closeAIModal();
            }, 2000);
        }
        
        // 返回上一页
        function goBack() {
            window.history.back();
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
</body>
</html>
