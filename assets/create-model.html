        <div class="create-form">
            <h2>模型信息</h2>
            
            <div class="form-group">
                <label for="modelName">模型名称</label>

            </div>

                <textarea id="modelDescription" placeholder="请输入模型描述"></textarea>

                    <button class="btn-ai-generate" onclick="openAIModal()">

                    </button>
                </div>
                <div class="image-upload" onclick="document.getElementById('modelImage').click()">
                    <input type="file" id="modelImage" accept="image/*">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击上传图片或拖拽图片到此处</p>
                    <img id="previewImage" class="preview-image hidden" src="" alt="预览图片">
                </div>
            </div>
            
            <div class="form-group">
                <label for="modelType">模型类型</label>
                <select id="modelType">
                    <option value="style">风格迁移</option>
                    <option value="enhancement">图像增强</option>
                    <option value="generation">图像生成</option>
                    <option value="detection">目标检测</option>
                    <option value="segmentation">图像分割</option>
                    <option value="other">其他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="modelRarity">稀有度</label>
                <select id="modelRarity">
                    <option value="common">普通</option>
                    <option value="uncommon">优秀</option>
                    <option value="rare">稀有</option>
                    <option value="epic">史诗</option>
                    <option value="legendary">传说</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="modelParams">技术参数</label>
                <textarea id="modelParams" placeholder="请输入模型的技术参数，每行一个"></textarea>
            </div>
            
            <div class="form-group">
                <label for="modelUsage">使用方法</label>
                <textarea id="modelUsage" placeholder="请输入模型的使用方法，每行一个步骤"></textarea>
            </div>
            
            <div class="form-group">
                <label for="modelTags">标签</label>
                <input type="text" id="modelTags" placeholder="请输入标签，用逗号分隔">
                <div class="tag-input" id="tagInput"></div>
            </div>
            
            <div class="form-group">
                <label for="modelPoints">使用积分</label>
                <input type="number" id="modelPoints" min="0" placeholder="请输入使用该模型需要消耗的积分">
            </div>
            
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="goBack()">取消</button>
                <button class="btn btn-primary" onclick="saveDraft()">保存草稿</button>
                <button class="btn btn-primary" onclick="publishModel()">发布</button>
            </div>
        </div>
    </div>

            <div class="modal-footer">

            </div>
        </div>
    </div>

                pairs.forEach(pair => {
                    const [key, value] = pair.split('=');
                    params[decodeURIComponent(key)] = decodeURIComponent(value || '');

        // 页面加载时初始化
        function init() {
            const params = getUrlParams();
            if (params.type === 'edit' && params.id) {
                loadDraftData(params.id, params.dataType);
                document.querySelector('.create-form h2').textContent = '编辑模型';
            }
            
            // 图片上传预览
            document.getElementById('modelImage').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const previewImage = document.getElementById('previewImage');
                        previewImage.src = e.target.result;
                        previewImage.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // 标签输入处理
            document.getElementById('modelTags').addEventListener('keypress', function(e) {
                if (e.key === ',') {
                    e.preventDefault();
                    addTag(this.value.trim());
                    this.value = '';
                }
            });
        }
        
        // 加载草稿数据
        function loadDraftData(id, dataType) {
            const models = mockModels[dataType] || [];
            const draft = models.find(m => m.id == id);
            
            if (draft) {
                // 填充表单
                document.getElementById('modelName').value = draft.title || '';
                document.getElementById('modelDescription').value = draft.description || '';
                document.getElementById('modelType').value = draft.type || 'style';
                document.getElementById('modelRarity').value = draft.rarity || 'common';
                document.getElementById('modelParams').value = draft.params || '';
                document.getElementById('modelUsage').value = draft.usage || '';
                document.getElementById('modelPoints').value = draft.points || 0;
                
                // 设置标签
                if (draft.tags && draft.tags.length > 0) {
                    document.getElementById('modelTags').value = draft.tags.join(', ');
                    draft.tags.forEach(tag => addTag(tag));
                }
                
                // 设置预览图片
                if (draft.image) {
                    const previewImage = document.getElementById('previewImage');
                    previewImage.src = draft.image;
                    previewImage.classList.remove('hidden');
                }
            } else {
                console.log('未找到模型数据:', id, dataType);
            }
        }
        
        // 添加标签
        function addTag(tagText) {
            if (!tagText) return;
            
            const tagInput = document.getElementById('tagInput');
            const tagElement = document.createElement('div');
            tagElement.className = 'tag';
            tagElement.innerHTML = `${tagText}<span class="remove-tag" onclick="removeTag(this)">×</span>`;
            tagInput.appendChild(tagElement);
        }
        
        // 移除标签
        function removeTag(element) {
            element.parentElement.remove();
        }
        
        // 保存草稿
        function saveDraft() {
            const modelData = collectFormData();
            modelData.status = 'draft';
            
            // 模拟保存操作
            alert('草稿已保存');
            window.location.href = 'my-assets-model.html';
        }
        
        // 发布模型
        function publishModel() {
            const modelData = collectFormData();
            modelData.status = 'public';
            
            // 模拟发布操作
            if (confirm('确定要发布这个模型吗？')) {
                alert('模型已提交审核！');
                window.location.href = 'my-assets-model.html';
            }
        }
        
        // 收集表单数据
        function collectFormData() {
            const tags = [];
            document.querySelectorAll('.tag').forEach(tag => {
                tags.push(tag.textContent.replace('×', '').trim());
            });
            
            return {
                title: document.getElementById('modelName').value,
                description: document.getElementById('modelDescription').value,
                type: document.getElementById('modelType').value,
                rarity: document.getElementById('modelRarity').value,
                params: document.getElementById('modelParams').value,
                usage: document.getElementById('modelUsage').value,
                tags: tags,
                points: parseInt(document.getElementById('modelPoints').value) || 0,
                image: document.getElementById('previewImage').src
            };
        }
        
        // AI生成相关函数
        function openAIModal() {
            document.getElementById('aiModal').classList.add('active');
        }
        
        function closeAIModal() {
            document.getElementById('aiModal').classList.remove('active');
        }
        
        function generateWithAI() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) {
                alert('请输入生成提示');
                return;
            }
            
            // 模拟 AI 生成过程
            alert('AI 生成中，请稍候...');
            
            // 模拟生成结果
            setTimeout(() => {
                document.getElementById('previewImage').src = `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(prompt)}&image_size=landscape_4_3`;
                document.getElementById('previewImage').classList.remove('hidden');
                closeAIModal();
            }, 2000);
        }
        
        // 返回上一页
        function goBack() {
            window.history.back();
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
