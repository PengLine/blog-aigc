                    </button>
                </div>
                <div class="image-upload" onclick="document.getElementById('propImage').click()">
                    <input type="file" id="propImage" accept="image/*">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击上传图片或拖拽图片到此处</p>
                    <img id="previewImage" class="preview-image hidden" src="" alt="预览图片">
                </div>
            </div>
            
            <div class="form-group">
                <label for="propType">道具类型</label>
                <select id="propType">
                    <option value="weapon">武器</option>
                    <option value="armor">防具</option>
                    <option value="tool">工具</option>
                    <option value="consumable">消耗品</option>
                    <option value="accessory">饰品</option>
                    <option value="material">材料</option>
                    <option value="treasure">宝物</option>
                    <option value="other">其他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="propRarity">稀有度</label>
                <select id="propRarity">
                    <option value="common">普通</option>
                    <option value="uncommon">稀有</option>
                    <option value="rare">罕见</option>
                    <option value="epic">史诗</option>
                    <option value="legendary">传说</option>
                    <option value="mythical">神话</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="propEffect">效果/属性</label>
                <textarea id="propEffect" placeholder="请输入道具的效果或属性"></textarea>
            </div>
            
            <div class="form-group">
                <label for="propTags">标签</label>
                <input type="text" id="propTags" placeholder="请输入标签，用逗号分隔">
                <div class="tag-input" id="tagInput"></div>
            </div>
            
            <div class="form-group">
                <label for="propPoints">使用积分</label>
                <input type="number" id="propPoints" min="0" placeholder="请输入使用该道具需要消耗的积分">
            </div>
            
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="goBack()">取消</button>
                <button class="btn btn-primary" onclick="saveDraft()">保存草稿</button>
                <button class="btn btn-primary" onclick="publishProp()">发布</button>
            </div>
        </div>
    </div>
    
    <!-- AI 生成弹框 -->

        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">AI 生成图片</h3>
                <button class="modal-close" onclick="closeAIModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="aiPrompt">生成提示</label>
                    <textarea class="ai-prompt" id="aiPrompt" placeholder="请输入生成提示，例如：一把散发着蓝色光芒的魔法剑，剑身上刻有古老的符文"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAIModal()">取消</button>
                <button class="btn btn-primary" onclick="generateWithAI()">生成</button>
            </div>
        </div>
    </div>

            const params = {};
            const search = window.location.search;
            if (search) {
                const pairs = search.substring(1).split('&');
                pairs.forEach(pair => {
                    const [key, value] = pair.split('=');
                    params[decodeURIComponent(key)] = decodeURIComponent(value || '');
                });
            }
            return params;
        }

        // 页面加载时初始化
        function init() {
            const params = getUrlParams();
            if (params.type === 'edit' && params.id) {
                loadDraftData(params.id, params.dataType);
                document.getElementById('pageTitle').textContent = '编辑道具';
                document.getElementById('pageDescription').textContent = '编辑您的AI道具资产';
            }
            
            // 图片上传预览
            document.getElementById('propImage').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const previewImage = document.getElementById('previewImage');
                        previewImage.src = e.target.result;
                        previewImage.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // 标签输入处理
            document.getElementById('propTags').addEventListener('keypress', function(e) {
                if (e.key === ',') {
                    e.preventDefault();
                    addTag(this.value.trim());
                    this.value = '';
                }
            });
        }
        
        // 加载草稿数据
        function loadDraftData(id, dataType) {
            const props = mockProps[dataType] || [];
            const draft = props.find(p => p.id == id);
            
            if (draft) {
                // 填充表单
                document.getElementById('propName').value = draft.title || '';
                document.getElementById('propDescription').value = draft.description || '';
                document.getElementById('propType').value = draft.type || 'weapon';
                document.getElementById('propRarity').value = draft.rarity || 'common';
                document.getElementById('propEffect').value = draft.effect || '';
                document.getElementById('propPoints').value = draft.points || 0;
                
                // 设置标签
                if (draft.tags && draft.tags.length > 0) {
                    document.getElementById('propTags').value = draft.tags.join(', ');
                    draft.tags.forEach(tag => addTag(tag));
                }
                
                // 设置预览图片
                if (draft.image) {
                    const previewImage = document.getElementById('previewImage');
                    previewImage.src = draft.image;
                    previewImage.classList.remove('hidden');
                }
            } else {
                console.log('未找到道具数据:', id, dataType);
            }
        }
        
        // 添加标签
        function addTag(tagText) {
            if (!tagText) return;
            
            const tagInput = document.getElementById('tagInput');
            const tagElement = document.createElement('div');
            tagElement.className = 'tag';
            tagElement.innerHTML = `${tagText}<span class="remove-tag" onclick="removeTag(this)">×</span>`;
            tagInput.appendChild(tagElement);
        }
        
        // 移除标签
        function removeTag(element) {
            element.parentElement.remove();
        }
        
        // 保存草稿
        function saveDraft() {
            const propData = collectFormData();
            propData.status = 'draft';
            
            // 模拟保存操作
            alert('草稿已保存');
            window.location.href = 'my-assets-prop.html';
        }
        
        // 发布道具
        function publishProp() {
            const propData = collectFormData();
            propData.status = 'public';
            
            // 模拟发布操作
            alert('道具已发布');
            window.location.href = 'my-assets-prop.html';
        }
        
        // 收集表单数据
        function collectFormData() {
            const tags = Array.from(document.querySelectorAll('.tag')).map(tag => tag.textContent.replace('×', '').trim());
            
            return {
                title: document.getElementById('propName').value,
                description: document.getElementById('propDescription').value,
                image: document.getElementById('previewImage').src || '',
                type: document.getElementById('propType').value,
                rarity: document.getElementById('propRarity').value,
                effect: document.getElementById('propEffect').value,
                tags: tags,
                points: parseInt(document.getElementById('propPoints').value) || 0
            };
        }
        
        // 打开 AI 生成弹框
        function openAIModal() {
            document.getElementById('aiModal').classList.add('active');
        }
        
        // 关闭 AI 生成弹框
        function closeAIModal() {
            document.getElementById('aiModal').classList.remove('active');
        }
        
        // 使用 AI 生成
        function generateWithAI() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) {
                alert('请输入生成提示');
                return;
            }
            
            // 模拟 AI 生成过程
            alert('AI 生成中，请稍候...');
            
            // 模拟生成结果
            setTimeout(() => {
                document.getElementById('previewImage').src = `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(prompt)}&image_size=landscape_4_3`;
                document.getElementById('previewImage').classList.remove('hidden');
                closeAIModal();
            }, 2000);
        }
        
        // 返回上一页
        function goBack() {
            window.history.back();
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
</body>
</html>
