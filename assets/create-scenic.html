            transition: all 0.3s ease;
        }
        
        .back-link:hover {

            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 30px;

            border-radius: 10px;
            font-size: 1rem;

    <div class="container">
        <a href="my-assets-scenic.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回我的景点</a>
        
        <div class="create-form">
            <h2>景点信息</h2>
            
            <div class="form-group">
                <label for="scenicName">景点名称</label>
                <input type="text" id="scenicName" placeholder="请输入景点名称">
            </div>
            
            <div class="form-group">
                <label for="scenicDescription">景点描述</label>
                <textarea id="scenicDescription" placeholder="请输入景点描述"></textarea>
            </div>
            
            <div class="form-group">
                <div class="label-with-button">
                    <label>景点图片</label>
                    <button class="btn-ai-generate" onclick="openAIModal()">
                        <i class="fas fa-magic"></i> AI 生成
                    </button>
                </div>
                <div class="image-upload" onclick="document.getElementById('scenicImage').click()">
                    <input type="file" id="scenicImage" accept="image/*">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击上传图片或拖拽图片到此处</p>
                    <img id="previewImage" class="preview-image hidden" src="" alt="预览图片">
                </div>
            </div>
            
            <div class="form-group">
                <label for="scenicType">景点类型</label>
                <select id="scenicType">
                    <option value="forest">森林</option>
                    <option value="mountain">山脉</option>
                    <option value="coast">海岸</option>
                    <option value="lake">湖泊</option>
                    <option value="desert">沙漠</option>
                    <option value="city">城市</option>
                    <option value="other">其他</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="scenicRarity">稀有度</label>
                <select id="scenicRarity">
                    <option value="common">普通</option>
                    <option value="uncommon">优秀</option>
                    <option value="rare">稀有</option>
                    <option value="epic">史诗</option>
                    <option value="legendary">传说</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="scenicFeatures">景点特色</label>
                <textarea id="scenicFeatures" placeholder="请输入景点特色，每行一个"></textarea>
            </div>
            
            <div class="form-group">
                <label for="scenicBestTime">最佳游览时间</label>
                <textarea id="scenicBestTime" placeholder="请输入最佳游览时间，每行一个"></textarea>
            </div>
            
            <div class="form-group">
                <label for="scenicTags">标签</label>
                <input type="text" id="scenicTags" placeholder="请输入标签，用逗号分隔">
                <div class="tag-input" id="tagInput"></div>
            </div>
            
            <div class="form-group">
                <label for="scenicPoints">使用积分</label>
                <input type="number" id="scenicPoints" min="0" placeholder="请输入使用该景点需要消耗的积分">
            </div>
            
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="goBack()">取消</button>
                <button class="btn btn-primary" onclick="saveDraft()">保存草稿</button>
                <button class="btn btn-primary" onclick="publishScenic()">发布</button>
            </div>
        </div>
    </div>
    
    <!-- AI 生成弹框 -->

        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">AI 生成图片</h3>
                <button class="modal-close" onclick="closeAIModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="aiPrompt">生成提示</label>
                    <textarea class="ai-prompt" id="aiPrompt" placeholder="请输入生成提示，例如：神秘森林，魔法氛围，梦幻光影"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAIModal()">取消</button>
                <button class="btn btn-primary" onclick="generateWithAI()">生成</button>
            </div>
        </div>
    </div>

            const params = {};
            const search = window.location.search;
            if (search) {
                const pairs = search.substring(1).split('&');
                pairs.forEach(pair => {
                    const [key, value] = pair.split('=');
                    params[decodeURIComponent(key)] = decodeURIComponent(value || '');
                });
            }
            return params;
        }

        // 页面加载时初始化
        function init() {
            const params = getUrlParams();
            if (params.type === 'edit' && params.id) {
                loadDraftData(params.id, params.dataType);
                document.querySelector('.create-form h2').textContent = '编辑景点';
            }
            
            // 图片上传预览
            document.getElementById('scenicImage').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const previewImage = document.getElementById('previewImage');
                        previewImage.src = e.target.result;
                        previewImage.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });
            
            // 标签输入处理
            document.getElementById('scenicTags').addEventListener('keypress', function(e) {
                if (e.key === ',') {
                    e.preventDefault();
                    addTag(this.value.trim());
                    this.value = '';
                }
            });
        }
        
        // 加载草稿数据
        function loadDraftData(id, dataType) {
            const scenics = mockScenics[dataType] || [];
            const draft = scenics.find(s => s.id == id);
            
            if (draft) {
                // 填充表单
                document.getElementById('scenicName').value = draft.title || '';
                document.getElementById('scenicDescription').value = draft.description || '';
                document.getElementById('scenicType').value = draft.type || 'forest';
                document.getElementById('scenicRarity').value = draft.rarity || 'common';
                document.getElementById('scenicFeatures').value = draft.features || '';
                document.getElementById('scenicBestTime').value = draft.bestTime || '';
                document.getElementById('scenicPoints').value = draft.points || 0;
                
                // 设置标签
                if (draft.tags && draft.tags.length > 0) {
                    document.getElementById('scenicTags').value = draft.tags.join(', ');
                    draft.tags.forEach(tag => addTag(tag));
                }
                
                // 设置预览图片
                if (draft.image) {
                    const previewImage = document.getElementById('previewImage');
                    previewImage.src = draft.image;
                    previewImage.classList.remove('hidden');
                }
            } else {
                console.log('未找到景点数据:', id, dataType);
            }
        }
        
        // 添加标签
        function addTag(tagText) {
            if (!tagText) return;
            
            const tagInput = document.getElementById('tagInput');
            const tagElement = document.createElement('div');
            tagElement.className = 'tag';
            tagElement.innerHTML = `${tagText}<span class="remove-tag" onclick="removeTag(this)">×</span>`;
            tagInput.appendChild(tagElement);
        }
        
        // 移除标签
        function removeTag(element) {
            element.parentElement.remove();
        }
        
        // 保存草稿
        function saveDraft() {
            const scenicData = collectFormData();
            scenicData.status = 'draft';
            
            // 模拟保存操作
            alert('草稿已保存');
            window.location.href = 'my-assets-scenic.html';
        }
        
        // 发布景点
        function publishScenic() {
            const scenicData = collectFormData();
            scenicData.status = 'public';
            
            // 模拟发布操作
            if (confirm('确定要发布这个景点吗？')) {
                alert('景点已提交审核！');
                window.location.href = 'my-assets-scenic.html';
            }
        }
        
        // 收集表单数据
        function collectFormData() {
            const tags = [];
            document.querySelectorAll('.tag').forEach(tag => {
                tags.push(tag.textContent.replace('×', '').trim());
            });
            
            return {
                title: document.getElementById('scenicName').value,
                description: document.getElementById('scenicDescription').value,
                type: document.getElementById('scenicType').value,
                rarity: document.getElementById('scenicRarity').value,
                features: document.getElementById('scenicFeatures').value,
                bestTime: document.getElementById('scenicBestTime').value,
                tags: tags,
                points: parseInt(document.getElementById('scenicPoints').value) || 0,
                image: document.getElementById('previewImage').src
            };
        }
        
        // AI生成相关函数
        function openAIModal() {
            document.getElementById('aiModal').classList.add('active');
        }
        
        function closeAIModal() {
            document.getElementById('aiModal').classList.remove('active');
        }
        
        function generateWithAI() {
            const prompt = document.getElementById('aiPrompt').value;
            if (!prompt) {
                alert('请输入生成提示');
                return;
            }
            
            // 模拟 AI 生成过程
            alert('AI 生成中，请稍候...');
            
            // 模拟生成结果
            setTimeout(() => {
                document.getElementById('previewImage').src = `https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=${encodeURIComponent(prompt)}&image_size=landscape_4_3`;
                document.getElementById('previewImage').classList.remove('hidden');
                closeAIModal();
            }, 2000);
        }
        
        // 返回上一页
        function goBack() {
            window.history.back();
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            init();
        });
    </script>
