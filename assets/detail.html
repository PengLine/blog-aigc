<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品详情 - AIGC创作平台</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* 详情页样式 */
        .detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .detail-header {
            margin-bottom: 40px;
        }

        .detail-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .detail-meta {
            display: flex;
            justify-content: flex-end;
            gap: 30px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .detail-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e0e0e0;
        }

        .author-name {
            font-weight: 600;
            color: #333;
        }

        .detail-type {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, #2196f3, #1976d2);
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .detail-subtype {
            display: inline-block;
            padding: 4px 12px;
            background: #f0f0f0;
            color: #666;
            border-radius: 16px;
            font-size: 0.8rem;
        }

        .detail-media {
            position: relative;
            background: #f8f9fa;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .detail-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .detail-image:hover {
            transform: scale(1.02);
        }

        .detail-video {
            width: 100%;
            height: 500px;
            object-fit: cover;
        }

        .detail-description {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .detail-description h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .detail-description p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #666;
        }

        .detail-actions {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            margin-bottom: 40px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            background: white;
            color: #666;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #f8f9fa;
            border-color: #2196f3;
            color: #1976d2;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.2);
        }

        .action-btn.liked {
            background: #ffebee;
            border-color: #f44336;
            color: #f44336;
        }

        .action-btn.favorited {
            background: #fff3e0;
            border-color: #ff9800;
            color: #ff9800;
        }

        .detail-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 40px;
        }

        .detail-tag {
            padding: 8px 16px;
            background: #f0f0f0;
            color: #666;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .detail-tag:hover {
            background: #e3f2fd;
            color: #1976d2;
        }

        .related-works {
            margin-top: 60px;
        }

        .related-works h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .related-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .related-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .related-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .related-content {
            padding: 15px;
        }

        .related-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .related-description {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
        }

        /* 图片预览模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .modal-image {
            width: 100%;
            height: auto;
            max-height: 90vh;
            object-fit: contain;
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .detail-container {
                padding: 20px 15px;
            }

            .detail-header h1 {
                font-size: 2rem;
            }

            .detail-meta {
                gap: 15px;
            }

            .detail-image,
            .detail-video {
                height: 300px;
            }

            .detail-description {
                padding: 20px;
            }

            .detail-actions {
                flex-direction: column;
                gap: 10px;
            }

            .action-btn {
                justify-content: center;
            }

            .related-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <div class="container">

        <!-- 主内容区域 -->
        <div class="main-content">
            <div class="detail-container">
                <button class="action-btn" onclick="window.location.href='index.html'">
                    <span>⬅️</span>
                    <span>返回</span>
                </button>

                <div class="detail-meta">
                    <div class="detail-author">
                        <img src="" alt="作者头像" class="author-avatar" id="authorAvatar">
                        <span class="author-name" id="authorName">加载中...</span>
                    </div>
                    <span class="detail-type" id="detailType">加载中...</span>
                    <span class="detail-subtype" id="detailSubtype">加载中...</span>
                </div>

                <!-- 详情头部 -->
                <div class="detail-header">
                    <h1 id="detailTitle">加载中...</h1>
                    <!-- 标签 -->
                    <div class="detail-tags" id="detailTags">
                        <!-- 标签将通过JavaScript动态生成 -->
                    </div>

                </div>

                <!-- 媒体内容 -->
                <div class="detail-media" id="detailMedia">
                    <!-- 内容将通过JavaScript动态生成 -->
                </div>

                <!-- 描述 -->
                <div class="detail-description">
                    <h2>作品描述</h2>
                    <p id="detailDescription">加载中...</p>
                </div>

                <!-- 操作按钮 -->
                <div class="detail-actions">
                    <button class="action-btn" id="likeBtn" onclick="toggleLike()">
                        <span>❤️</span>
                        <span id="likeCount">0</span>
                        <span>点赞</span>
                    </button>
                    <button class="action-btn" id="favoriteBtn" onclick="toggleFavorite()">
                        <span>⭐</span>
                        <span id="favoriteCount">0</span>
                        <span>收藏</span>
                    </button>
                    <button class="action-btn" onclick="shareContent()">
                        <span>📤</span>
                        <span>分享</span>
                    </button>
                </div>

                <!-- 相关作品 -->
                <div class="related-works">
                    <h2>相关作品</h2>
                    <div class="related-grid" id="relatedGrid">
                        <!-- 相关作品将通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 图片预览模态框 -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <img src="" alt="预览图片" class="modal-image" id="modalImage">
        </div>
    </div>

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', () => {
            initNavMenu();
            loadDetailData();
        });

        // 加载详情数据
        function loadDetailData() {
            // 获取URL参数中的id
            const urlParams = new URLSearchParams(window.location.search);
            const id = parseInt(urlParams.get('id')) || 1;

            // 查找对应的数据
            const item = data.find(item => item.id === id);

            if (item) {
                // 填充数据
                document.getElementById('detailTitle').textContent = item.title;
                document.getElementById('authorAvatar').src = item.author.avatar;
                document.getElementById('authorName').textContent = item.author.name;
                document.getElementById('detailType').textContent = getTypeText(item.type);
                document.getElementById('detailSubtype').textContent = getSubtypeText(item.subtype);
                document.getElementById('detailDescription').textContent = item.description;
                document.getElementById('likeCount').textContent = item.likes;
                document.getElementById('favoriteCount').textContent = item.favorites;

                // 生成媒体内容
                const mediaContainer = document.getElementById('detailMedia');
                if (item.mediaType === 'image') {
                    mediaContainer.innerHTML = `
                        <img src="${item.image}" alt="${item.title}" class="detail-image" onclick="openModal('${item.image}')">
                    `;
                } else if (item.mediaType === 'video') {
                    mediaContainer.innerHTML = `
                        <video src="${item.video}" class="detail-video" controls></video>
                    `;
                }

                // 生成标签
                const tagsContainer = document.getElementById('detailTags');
                tagsContainer.innerHTML = item.tags.map(tag => `
                    <span class="detail-tag">${tag}</span>
                `).join('');

                // 生成相关作品
                generateRelatedWorks(item.type, item.id);
            } else {
                // 未找到数据
                document.getElementById('detailTitle').textContent = '作品不存在';
                document.getElementById('detailDescription').textContent = '抱歉，您访问的作品不存在或已被删除。';
            }
        }

        // 生成相关作品
        function generateRelatedWorks(type, currentId) {
            const relatedGrid = document.getElementById('relatedGrid');
            const relatedItems = data.filter(item => item.type === type && item.id !== currentId).slice(0, 4);

            if (relatedItems.length > 0) {
                relatedGrid.innerHTML = relatedItems.map(item => `
                    <div class="related-card" onclick="window.location.href='detail.html?id=${item.id}'">
                        <img src="${item.image || 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=placeholder%20image&image_size=landscape_4_3'}" alt="${item.title}" class="related-image">
                        <div class="related-content">
                            <h3 class="related-title">${item.title}</h3>
                            <p class="related-description">${item.description.substring(0, 100)}...</p>
                        </div>
                    </div>
                `).join('');
            } else {
                relatedGrid.innerHTML = '<p style="text-align: center; color: #666; grid-column: 1 / -1;">暂无相关作品</p>';
            }
        }

        // 获取类型文本
        function getTypeText(type) {
            const typeMap = {
                'character': '角色',
                'prop': '道具',
                'scenic': '景点',
                'video': '短剧',
                'model': '模型'
            };
            return typeMap[type] || type;
        }

        // 获取子类型文本
        function getSubtypeText(subtype) {
            const subtypeMap = {
                'parent-child': '亲子',
                'couple': '情侣',
                'campus': '校园',
                'dance': '舞蹈',
                'travel': '旅行',
                'food': '美食',
                'anime': '二次元',
                'sport': '运动',
                'technology': '技术',
                'esport': '电竞',
                'other': '其他'
            };
            return subtypeMap[subtype] || subtype;
        }

        // 切换点赞状态
        function toggleLike() {
            const likeBtn = document.getElementById('likeBtn');
            const likeCount = document.getElementById('likeCount');

            if (likeBtn.classList.contains('liked')) {
                likeBtn.classList.remove('liked');
                likeCount.textContent = parseInt(likeCount.textContent) - 1;
            } else {
                likeBtn.classList.add('liked');
                likeCount.textContent = parseInt(likeCount.textContent) + 1;
            }
        }

        // 切换收藏状态
        function toggleFavorite() {
            const favoriteBtn = document.getElementById('favoriteBtn');
            const favoriteCount = document.getElementById('favoriteCount');

            if (favoriteBtn.classList.contains('favorited')) {
                favoriteBtn.classList.remove('favorited');
                favoriteCount.textContent = parseInt(favoriteCount.textContent) - 1;
            } else {
                favoriteBtn.classList.add('favorited');
                favoriteCount.textContent = parseInt(favoriteCount.textContent) + 1;
            }
        }

        // 分享内容
        function shareContent() {
            if (navigator.share) {
                navigator.share({
                    title: document.getElementById('detailTitle').textContent,
                    url: window.location.href
                });
            } else {
                // 复制链接到剪贴板
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('链接已复制到剪贴板');
                });
            }
        }

        // 打开图片预览模态框
        function openModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');

            modalImage.src = imageUrl;
            modal.style.display = 'flex';
        }

        // 关闭图片预览模态框
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // 点击模态框外部关闭
        window.onclick = function (event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
